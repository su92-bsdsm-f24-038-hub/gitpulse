<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Export SumDiff Icons</title>
  <style>body{font-family:system-ui;padding:20px;background:#071025;color:#dff}button{margin:6px;padding:8px 12px;border-radius:6px;border:none;background:#0b61d8;color:#fff;cursor:pointer}</style>
</head>
<body>
  <h3>Export SumDiff PNG icons</h3>
  <p>Click a button to download a PNG version of the embedded SVG at the requested size.</p>
  <div>
    <button onclick="download(16)">Download 16×16 PNG</button>
    <button onclick="download(48)">Download 48×48 PNG</button>
    <button onclick="download(128)">Download 128×128 PNG</button>
  </div>
  <script>
    const svgText = `<?xml version="1.0" encoding="UTF-8"?>\n${document.querySelector('svg') ? '' : ''}`;
    async function download(size){
      const svg = `<?xml version="1.0" encoding="UTF-8"?>\n` +
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">`+
        `<defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0b61d8"/><stop offset="1" stop-color="#084fb0"/></linearGradient></defs>`+
        `<rect width="256" height="256" rx="40" fill="url(#g)"/>`+
        `<text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="Segoe UI, Roboto, Inter, Arial" font-weight="700" font-size="120">SD</text>`+
        `</svg>`;
      const blob = new Blob([svg], {type: 'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = size; c.height = size; const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        c.toBlob((b)=>{
          const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `sumdiff-${size}.png`; a.click(); a.remove();
        }, 'image/png');
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }
  </script>
</body>
</html>
